<div class="auth-page">
  <header class="auth-topbar">
    <a routerLink="/home" class="auth-brand">Task Manager</a>
    <nav class="auth-topbar-nav" aria-label="アカウント">
      <a routerLink="/home" class="auth-topbar-link">ホーム</a>
      <a routerLink="/signup" class="auth-topbar-link auth-topbar-link--emphasis">新規登録</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1 class="auth-title">ログインいん</h1>
      <p class="auth-lead">登録したメールアドレスとパスワードでサインインします。</p>

      @if (showSignupVerificationNotice) {
        <div class="auth-notice auth-notice--info" role="status">
          確認メールを送信しました。メール内のリンクを開いたうえで、ここからログインしてください。
        </div>
      }

      <div class="auth-fields">
        <label class="auth-label" for="login-email">メールアドレス</label>
        <input
          id="login-email"
          type="email"
          [(ngModel)]="email"
          class="auth-input"
          placeholder="example@email.com"
          autocomplete="email"
        />

        <label class="auth-label" for="login-password">パスワード</label>
        <input
          id="login-password"
          type="password"
          [(ngModel)]="password"
          class="auth-input"
          placeholder="パスワード"
          autocomplete="current-password"
        />
      </div>

      <div class="auth-actions">
        <button type="button" class="auth-btn auth-btn--primary" (click)="onLogin()">ログイン</button>
        <a routerLink="/signup" class="auth-btn auth-btn--secondary">アカウントをお持ちでない方はこちら</a>
      </div>
    </div>
  </main>
</div>
